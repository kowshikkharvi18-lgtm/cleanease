<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanEase - Admin Login</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CleanEase">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🧺 CleanEase</h1>
                <p>Admin Portal</p>
            </div>

            <!-- Admin Login -->
            <form id="adminLoginForm" class="login-form active">
                <h2>Admin Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="adminUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="pw-input-wrap">
                        <input type="password" id="adminPassword" placeholder="Enter password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('adminPassword', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="admin-login.js"></script>
    <script>
        function togglePw(inputId, btn) {
            var input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            btn.textContent = input.type === "password" ? "👁️" : "🙈";
        }
    </script>
</body>
</html>
